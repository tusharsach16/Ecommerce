spring.application.name=ecom-proj

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:db_userql://localhost:5432/your_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REDACTED_PASSWORD}
spring.datasource.driver-class-name=org.db_userql.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# Didb_userble internal SQL initialization as we use Flyway
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
